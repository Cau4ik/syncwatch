databases:
  - name: syncwatch-postgres
    databaseName: syncwatch
    user: syncwatch
    plan: free

services:
  - type: web
    name: syncwatch-api
    runtime: node
    rootDir: .
    buildCommand: corepack pnpm install && corepack pnpm --filter @syncwatch/api build
    startCommand: corepack pnpm --filter @syncwatch/api start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: WEB_URL
        sync: false
      - key: API_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: syncwatch-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
